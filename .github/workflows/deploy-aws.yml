# Deploy to AWS Lightsail via GHCR (GitHub Container Registry)
# No AWS IAM or ECR needed — images are stored on GitHub for free
#
# Required GitHub Secrets:
#   LIGHTSAIL_SSH_KEY   - Private SSH key for Lightsail instance (contents of .pem file)
#   LIGHTSAIL_HOST      - Static IP of your Lightsail instance
#
# Required GitHub Variables (Settings → Variables → Actions):
#   PUBLIC_URL          - Your domain or IP, e.g. https://yourdomain.com

name: Deploy to AWS Lightsail

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'client/**'
      - 'deployment/docker/**'
      - 'requirements.txt'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild all images'
        required: false
        default: 'false'
        type: boolean
      skip_deploy:
        description: 'Skip deployment (build only)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  PUBLIC_URL: ${{ vars.PUBLIC_URL || 'http://3.6.64.48.nip.io' }}

jobs:
  # Detect what changed to only build what's needed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      deployment: ${{ steps.changes.outputs.deployment }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'app/**'
              - 'deployment/docker/Dockerfile'
              - 'requirements.txt'
            frontend:
              - 'client/**'
            deployment:
              - 'deployment/docker/docker-compose.prod.yml'
              - 'deployment/docker/Caddyfile.prod'

  # Build and push backend image to GHCR
  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event.inputs.force_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/voice-ai-backend:latest
            ${{ env.IMAGE_PREFIX }}/voice-ai-backend:${{ github.sha }}
          build-args: |
            CACHEBUST=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and push frontend image to GHCR
  build-frontend:
    name: Build Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event.inputs.force_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/voice-ai-frontend:latest
            ${{ env.IMAGE_PREFIX }}/voice-ai-frontend:${{ github.sha }}
          build-args: |
            CACHEBUST=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Lightsail
  deploy:
    name: Deploy to Lightsail
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      github.event.inputs.skip_deploy != 'true' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.changes.outputs.deployment == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "deployment/docker/docker-compose.prod.yml,deployment/docker/Caddyfile.prod"
          target: "/tmp/deploy"
          strip_components: 2

      - name: Deploy on Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            echo "=== Starting deployment ==="

            # Update docker-compose and Caddyfile from repo
            [ -f /tmp/deploy/docker-compose.prod.yml ] && cp /tmp/deploy/docker-compose.prod.yml /opt/voice-ai/docker-compose.yml
            [ -f /tmp/deploy/Caddyfile.prod ]         && cp /tmp/deploy/Caddyfile.prod         /opt/voice-ai/Caddyfile
            rm -rf /tmp/deploy

            cd /opt/voice-ai

            # Load env vars (for GHCR credentials)
            export $(grep -v '^#' .env | xargs)

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull latest images
            docker compose pull

            # Restart with zero-downtime
            docker compose up -d --remove-orphans

            # Clean old images to save disk space
            docker image prune -f

            echo "=== Deployment complete ==="

  # Health check
  verify:
    name: Health Check
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for startup
        run: sleep 40

      - name: Health check
        run: |
          echo "Checking ${{ env.PUBLIC_URL }}/health ..."
          curl -f --retry 5 --retry-delay 10 --retry-connrefused \
            ${{ env.PUBLIC_URL }}/health || \
          curl -f --retry 5 --retry-delay 10 \
            http://${{ secrets.LIGHTSAIL_HOST }}:7860/health
          echo "Health check passed!"

  # Notify on failure
  notify:
    name: Notify on Failure
    needs: [build-backend, build-frontend, deploy, verify]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Failure notification
        run: echo "::error::Deployment failed — check the workflow logs."
