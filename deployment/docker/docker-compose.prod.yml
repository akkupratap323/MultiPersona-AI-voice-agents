# Production docker-compose for Lightsail deployment
# This file is synced to /opt/nester/docker-compose.yml during deployment
#
# Environment variables are loaded from .env file on the server
# The .env file is populated from AWS Secrets Manager
#
# CloudWatch Logs: Set CLOUDWATCH_LOG_GROUP and AWS_REGION in .env
# Example: CLOUDWATCH_LOG_GROUP=/nester-ai/dev

x-logging: &cloudwatch-logging
  driver: awslogs
  options:
    awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/nester-ai/dev}
    awslogs-region: ${AWS_REGION:-us-west-2}
    awslogs-create-group: "true"

services:
  caddy:
    image: caddy:2-alpine
    container_name: nester-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nester-network
    logging:
      <<: *cloudwatch-logging
      options:
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/nester-ai/dev}
        awslogs-region: ${AWS_REGION:-us-west-2}
        awslogs-stream: caddy
        awslogs-create-group: "true"

  backend:
    image: ${BACKEND_IMAGE:-196061557238.dkr.ecr.us-west-2.amazonaws.com/nester-ai-dev-backend:latest}
    container_name: nester-backend
    restart: always
    expose:
      - "7860"
      - "8765"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - nester-network
    logging:
      <<: *cloudwatch-logging
      options:
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/nester-ai/dev}
        awslogs-region: ${AWS_REGION:-us-west-2}
        awslogs-stream: backend
        awslogs-create-group: "true"

  frontend:
    image: ${FRONTEND_IMAGE:-196061557238.dkr.ecr.us-west-2.amazonaws.com/nester-ai-dev-frontend:latest}
    container_name: nester-frontend
    restart: always
    expose:
      - "80"
    environment:
      - BACKEND_URL=${PUBLIC_URL:-https://ai.nesterlabs.com}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nester-network
    logging:
      <<: *cloudwatch-logging
      options:
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/nester-ai/dev}
        awslogs-region: ${AWS_REGION:-us-west-2}
        awslogs-stream: frontend
        awslogs-create-group: "true"

networks:
  nester-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
